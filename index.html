<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bar KatKat 🍹</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#1a1a2e; --card:#16213e; --accent:#e94560; --green:#0f3460;
  --text:#eee; --sub:#aaa; --ok:#4ecca3; --warn:#f0a500; --danger:#e94560;
}
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; padding:12px; }

/* ========== COUNTDOWN ========== */
#countdown-screen {
  position:fixed; inset:0; z-index:100; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:24px;
}
#countdown-screen .logo { font-size:4em; margin-bottom:12px; animation:float 3s ease-in-out infinite; cursor:default; user-select:none; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
#countdown-screen h1 { font-size:2em; margin-bottom:4px; }
#countdown-screen .tagline { color:var(--sub); font-size:1em; margin-bottom:32px; font-style:italic; }
#countdown-timer { display:flex; gap:16px; margin-bottom:32px; }
#countdown-timer .unit { background:var(--card); border-radius:16px; padding:16px 20px; min-width:72px; }
#countdown-timer .unit .num { font-size:2.4em; font-weight:700; color:var(--accent); }
#countdown-timer .unit .label { font-size:.75em; color:var(--sub); text-transform:uppercase; letter-spacing:1px; }
#countdown-screen .tease { color:var(--sub); font-size:.85em; margin-top:8px; }
#countdown-screen .tease span { color:var(--accent); }
.particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.particle { position:absolute; font-size:1.4em; opacity:.15; animation:drift linear infinite; }
@keyframes drift { 0%{transform:translateY(100vh) rotate(0deg)} 100%{transform:translateY(-20vh) rotate(360deg)} }

/* ========== BAR ========== */
#bar-content { display:none; }
#bar-content.active { display:block; }
h1.bar-title { text-align:center; font-size:1.8em; padding:16px 0 8px; cursor:default; user-select:none; }
h1.bar-title small { display:block; font-size:.45em; color:var(--sub); font-weight:normal; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; padding:12px 0; }
.card { background:var(--card); border-radius:16px; padding:18px 14px; text-align:center; cursor:pointer;
  transition:transform .15s,box-shadow .15s; position:relative; }
.card:active { transform:scale(.96); }
.card .emoji { font-size:2.6em; }
.card .name { font-size:1.1em; font-weight:600; margin:6px 0 4px; }
.card .stock { font-size:2em; font-weight:700; }
.card .badge { position:absolute; top:10px; right:10px; font-size:.7em; padding:2px 8px; border-radius:10px; font-weight:600; }
.badge-na { background:#0f3460; color:#4ecca3; }
.badge-alc { background:#3a0a1e; color:#e94560; }
.stock-ok { color:var(--ok); }
.stock-warn { color:var(--warn); }
.stock-danger { color:var(--danger); }

/* Modal cocktail */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:10; justify-content:center; align-items:center; padding:16px; }
.overlay.active { display:flex; }
.modal { background:var(--card); border-radius:20px; max-width:420px; width:100%; max-height:85vh; overflow-y:auto; padding:20px; }
.modal h2 { font-size:1.4em; text-align:center; margin-bottom:4px; }
.modal .sub { text-align:center; color:var(--sub); font-size:.85em; margin-bottom:14px; }
.combo-btn { display:flex; align-items:center; justify-content:space-between; background:var(--bg); border:none; color:var(--text);
  width:100%; padding:14px 16px; border-radius:12px; margin:8px 0; font-size:1em; cursor:pointer; transition:background .15s; }
.combo-btn:active { background:#2a2a4e; }
.combo-btn .combo-name { font-weight:600; }
.combo-btn .combo-add { color:var(--sub); font-size:.85em; text-align:right; max-width:55%; }
.combo-btn.disabled { opacity:.35; pointer-events:none; }
.close-btn { display:block; margin:16px auto 0; background:var(--accent); border:none; color:#fff; padding:10px 32px;
  border-radius:12px; font-size:1em; cursor:pointer; }

/* Softs */
.soft-section { margin-top:20px; }
.soft-section h3 { font-size:1em; color:var(--sub); margin-bottom:8px; text-align:center; }
.soft-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; }
.soft-item { background:var(--card); border-radius:12px; padding:10px; text-align:center; font-size:.85em; }
.soft-item .soft-name { color:var(--sub); font-size:.8em; }
.soft-item .soft-count { font-size:1.4em; font-weight:700; margin:2px 0; }
.soft-ctrl { display:flex; justify-content:center; gap:8px; margin-top:4px; }
.soft-ctrl button { width:32px; height:32px; border-radius:50%; border:none; font-size:1.1em; cursor:pointer; font-weight:700; }
.soft-ctrl .minus { background:#3a0a1e; color:var(--danger); }
.soft-ctrl .plus { background:#0a2e1e; color:var(--ok); }

/* Toast */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--ok); color:#000;
  padding:10px 24px; border-radius:12px; font-weight:600; font-size:.95em; z-index:20; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }

/* ========== ADMIN PANEL ========== */
#admin-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:50; justify-content:center; align-items:flex-start; padding:16px; overflow-y:auto; }
#admin-overlay.active { display:flex; }
#admin-panel { background:var(--card); border-radius:20px; max-width:500px; width:100%; padding:20px; margin:20px auto; }
#admin-panel h2 { text-align:center; margin-bottom:16px; color:var(--accent); }
#admin-panel h3 { margin:16px 0 8px; color:var(--ok); font-size:1em; }
.admin-row { display:flex; align-items:center; justify-content:space-between; background:var(--bg); border-radius:10px; padding:10px 14px; margin:6px 0; }
.admin-row .admin-label { font-size:.95em; flex:1; }
.admin-row .admin-label small { color:var(--sub); }
.admin-stock-ctrl { display:flex; align-items:center; gap:8px; }
.admin-stock-ctrl button { width:30px; height:30px; border-radius:50%; border:none; font-size:1em; cursor:pointer; font-weight:700; }
.admin-stock-ctrl .minus { background:#3a0a1e; color:var(--danger); }
.admin-stock-ctrl .plus { background:#0a2e1e; color:var(--ok); }
.admin-stock-ctrl input { width:50px; text-align:center; background:var(--card); border:1px solid #333; color:var(--text); border-radius:8px; padding:4px; font-size:1em; }
.admin-add-form { background:var(--bg); border-radius:12px; padding:14px; margin:8px 0; }
.admin-add-form label { display:block; font-size:.8em; color:var(--sub); margin:8px 0 2px; }
.admin-add-form input, .admin-add-form select { width:100%; padding:8px; border-radius:8px; border:1px solid #333; background:var(--card); color:var(--text); font-size:.95em; }
.admin-add-form .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.admin-btn { display:inline-block; margin:6px 4px; padding:8px 20px; border-radius:10px; border:none; font-size:.95em; cursor:pointer; font-weight:600; }
.admin-btn-ok { background:var(--ok); color:#000; }
.admin-btn-danger { background:var(--danger); color:#fff; }
.admin-btn-accent { background:var(--accent); color:#fff; }
.admin-btn-close { background:#333; color:var(--text); }
.admin-actions { text-align:center; margin-top:16px; }
.admin-delete { cursor:pointer; color:var(--danger); font-size:.8em; margin-left:8px; opacity:.6; }
.admin-delete:hover { opacity:1; }

/* Combo admin */
.admin-combo-row { display:flex; align-items:center; gap:6px; background:var(--bg); border-radius:8px; padding:6px 10px; margin:4px 0; font-size:.85em; }
.admin-combo-row span { flex:1; }
.admin-combo-add { background:var(--bg); border-radius:8px; padding:8px; margin:4px 0; }
.admin-combo-add input { width:100%; padding:6px; border-radius:6px; border:1px solid #333; background:var(--card); color:var(--text); font-size:.85em; margin:2px 0; }
.admin-combo-add select { padding:6px; border-radius:6px; border:1px solid #333; background:var(--card); color:var(--text); font-size:.85em; }

@media(min-width:600px) { .grid { grid-template-columns:repeat(4,1fr); } }
</style>
</head>
<body>

<!-- COUNTDOWN -->
<div id="countdown-screen">
  <div class="particles" id="particles"></div>
  <div class="logo" id="countdown-logo">🍹</div>
  <h1>Bar KatKat</h1>
  <div class="tagline">Something's brewing...</div>
  <div id="countdown-timer">
    <div class="unit"><div class="num" id="cd-days">--</div><div class="label">Jours</div></div>
    <div class="unit"><div class="num" id="cd-hours">--</div><div class="label">Heures</div></div>
    <div class="unit"><div class="num" id="cd-mins">--</div><div class="label">Min</div></div>
    <div class="unit"><div class="num" id="cd-secs">--</div><div class="label">Sec</div></div>
  </div>
  <div class="tease">🔒 Ouverture le <span>5 avril à 11h30</span></div>
</div>

<!-- BAR -->
<div id="bar-content">
  <h1 class="bar-title" id="title">Bar KatKat 🍹<small>Choisis ton mix, compose ton cocktail !</small></h1>
  <div class="grid" id="mixGrid"></div>
  <div class="soft-section">
    <h3>🧊 Station diluants</h3>
    <div class="soft-grid" id="softGrid"></div>
  </div>
  <div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<!-- ADMIN -->
<div id="admin-overlay">
  <div id="admin-panel"></div>
</div>

<script>
// ========== DATA ==========
const DEFAULT_MIXES = [
  { id:'tropical', emoji:'🥭', name:'Mix Tropical', alc:false, stock:8,
    combos:[
      { name:'Tropical Fizz', add:'+ tonic', soft:'tonic' },
      { name:'Tropical Ananas', add:'+ jus ananas', soft:'ananas' },
      { name:'Tropical Mangue', add:'+ jus mangue', soft:'mangue' },
    ]},
  { id:'fresh', emoji:'🌿', name:'Mix Fresh', alc:false, stock:6,
    combos:[
      { name:'Virgin Mojito', add:'+ eau gazeuse + menthe + lime', soft:'gazeuse' },
      { name:'Fresh Tonic', add:'+ tonic', soft:'tonic' },
    ]},
  { id:'maitai', emoji:'🏝', name:'Mix Mai Tai', alc:true, stock:10,
    combos:[
      { name:'Mai Tai classique', add:'+ jus ananas', soft:'ananas' },
      { name:'Mai Tai Tropical', add:'+ jus mangue', soft:'mangue' },
      { name:'Mai Tai Ginger', add:'+ ginger beer', soft:'ginger' },
    ]},
  { id:'passion', emoji:'🍑', name:'Mix Passion', alc:true, stock:10,
    combos:[
      { name:'Pornstar Martini', add:'+ prosecco', soft:'prosecco' },
      { name:'Passion Orange', add:'+ jus orange', soft:'orange' },
      { name:'Passion Mangue', add:'+ jus mangue', soft:'mangue' },
      { name:'Passion Tonic', add:'+ tonic', soft:'tonic' },
      { name:'Passion Ananas', add:'+ jus ananas', soft:'ananas' },
    ]},
  { id:'ginger', emoji:'🫚', name:'Mix Ginger', alc:true, stock:8,
    combos:[
      { name:'Moscow Mule', add:'+ ginger beer + lime', soft:'ginger' },
      { name:'Ginger Sunrise', add:'+ jus orange', soft:'orange' },
      { name:'Ginger Ananas', add:'+ jus ananas', soft:'ananas' },
    ]},
  { id:'sunset', emoji:'🍊', name:'Mix Sunset', alc:true, stock:12,
    combos:[
      { name:'Sunset classique', add:'+ jus orange 🌅', soft:'orange' },
      { name:'Sunset Ananas', add:'+ jus ananas', soft:'ananas' },
      { name:'Sunset Tonic', add:'+ tonic', soft:'tonic' },
    ]},
  { id:'espresso', emoji:'☕', name:'Mix Espresso', alc:true, stock:10,
    combos:[
      { name:'Espresso Martini', add:'+ café froid', soft:'cafe' },
      { name:'Espresso Orange', add:'+ jus orange', soft:'orange' },
      { name:'Espresso Ginger', add:'+ ginger beer', soft:'ginger' },
    ]},
];

const DEFAULT_SOFTS = [
  { id:'ginger', emoji:'🫚', name:'Ginger beer', stock:30 },
  { id:'orange', emoji:'🍊', name:'Jus orange', stock:30 },
  { id:'gazeuse', emoji:'💧', name:'Eau gazeuse', stock:20 },
  { id:'tonic', emoji:'🧊', name:'Tonic', stock:30 },
  { id:'ananas', emoji:'🍍', name:'Jus ananas', stock:30 },
  { id:'cafe', emoji:'☕', name:'Café froid', stock:10 },
  { id:'prosecco', emoji:'🥂', name:'Prosecco', stock:8 },
  { id:'mangue', emoji:'🥭', name:'Jus mangue', stock:20 },
];

// ========== STATE ==========
let MIXES, SOFTS, state;

function loadAll() {
  try {
    const saved = JSON.parse(localStorage.getItem('barkatkat_v2'));
    if (saved && saved.mixes && saved.softs && saved.stock) {
      MIXES = saved.mixes;
      SOFTS = saved.softs;
      state = saved.stock;
      return;
    }
  } catch(e) {}
  MIXES = JSON.parse(JSON.stringify(DEFAULT_MIXES));
  SOFTS = JSON.parse(JSON.stringify(DEFAULT_SOFTS));
  state = { mixes:{}, softs:{} };
  MIXES.forEach(m => state.mixes[m.id] = m.stock);
  SOFTS.forEach(d => state.softs[d.id] = d.stock);
}

function saveAll() {
  localStorage.setItem('barkatkat_v2', JSON.stringify({ mixes:MIXES, softs:SOFTS, stock:state }));
}

loadAll();

// ========== COUNTDOWN ==========
const LAUNCH = new Date('2026-04-05T11:30:00+02:00');

function spawnParticles() {
  const emojis = ['🍹','🍸','🧊','🍋','🫚','🥭','🍊','☕','🥂','🌿','🍍'];
  const c = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random()*100+'%';
    p.style.animationDuration = (8+Math.random()*12)+'s';
    p.style.animationDelay = (-Math.random()*15)+'s';
    p.style.fontSize = (1+Math.random()*1.2)+'em';
    c.appendChild(p);
  }
}

function launchBar() {
  document.getElementById('countdown-screen').style.display = 'none';
  document.getElementById('bar-content').classList.add('active');
}

function updateCountdown() {
  const diff = LAUNCH - new Date();
  if (diff <= 0) { launchBar(); return; }
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  document.getElementById('cd-days').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-mins').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-secs').textContent = String(s).padStart(2,'0');
  setTimeout(updateCountdown, 1000);
}

// Secret bypass: triple-tap on 🍹
let tapCount = 0, tapTimer;
document.getElementById('countdown-logo').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  if (tapCount >= 3) { tapCount = 0; launchBar(); return; }
  tapTimer = setTimeout(() => tapCount = 0, 600);
});

spawnParticles();
updateCountdown();

// ========== BAR RENDERING ==========
function stockClass(n) { return n<=0?'stock-danger':n<=3?'stock-warn':'stock-ok'; }

function renderMixes() {
  document.getElementById('mixGrid').innerHTML = MIXES.map(m => {
    const s = state.mixes[m.id] || 0;
    return `<div class="card" onclick="openMix('${m.id}')">
      <span class="badge ${m.alc?'badge-alc':'badge-na'}">${m.alc?'🔴 Alcool':'🟢 Sans alcool'}</span>
      <div class="emoji">${m.emoji}</div>
      <div class="name">${m.name}</div>
      <div class="stock ${stockClass(s)}">${s}</div>
    </div>`;
  }).join('');
}

function renderSofts() {
  document.getElementById('softGrid').innerHTML = SOFTS.map(d => {
    const s = state.softs[d.id] || 0;
    return `<div class="soft-item">
      <div class="soft-name">${d.emoji} ${d.name}</div>
      <div class="soft-count ${stockClass(s)}">${s}</div>
      <div class="soft-ctrl">
        <button class="minus" onclick="adjSoft('${d.id}',-1)">−</button>
        <button class="plus" onclick="adjSoft('${d.id}',1)">+</button>
      </div>
    </div>`;
  }).join('');
}

window.adjSoft = (id,d) => { state.softs[id] = Math.max(0,(state.softs[id]||0)+d); saveAll(); renderSofts(); };

window.openMix = (id) => {
  const m = MIXES.find(x=>x.id===id), s = state.mixes[id]||0;
  document.getElementById('modal').innerHTML = `
    <h2>${m.emoji} ${m.name}</h2>
    <div class="sub">Stock: <strong class="${stockClass(s)}">${s} fioles</strong></div>
    ${m.combos.map(c => {
      const ok = s>0 && (state.softs[c.soft]||0)>0;
      return `<button class="combo-btn ${ok?'':'disabled'}" onclick="makeCombo('${id}','${c.soft}')">
        <span class="combo-name">${c.name}</span>
        <span class="combo-add">${c.add}${(state.softs[c.soft]||0)<=0?' ⚠️':''}</span>
      </button>`;
    }).join('')}
    <button class="close-btn" onclick="closeModal()">Fermer</button>`;
  document.getElementById('overlay').classList.add('active');
};

window.makeCombo = (mixId,softId) => {
  if((state.mixes[mixId]||0)<=0||(state.softs[softId]||0)<=0) return;
  state.mixes[mixId]--; state.softs[softId]--;
  saveAll(); renderMixes(); renderSofts(); closeModal(); showToast('🍹 Cocktail servi !');
};

window.closeModal = () => document.getElementById('overlay').classList.remove('active');
document.getElementById('overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

renderMixes(); renderSofts();

// ========== ADMIN PANEL ==========
// Long press 3s on title → open admin
let adminTimer;
const title = document.getElementById('title');
function startAdmin() { adminTimer = setTimeout(openAdmin, 3000); }
function cancelAdmin() { clearTimeout(adminTimer); }
title.addEventListener('touchstart', startAdmin); title.addEventListener('touchend', cancelAdmin);
title.addEventListener('mousedown', startAdmin); title.addEventListener('mouseup', cancelAdmin);

function openAdmin() {
  renderAdmin();
  document.getElementById('admin-overlay').classList.add('active');
}
window.closeAdmin = () => {
  document.getElementById('admin-overlay').classList.remove('active');
  renderMixes(); renderSofts();
};
document.getElementById('admin-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeAdmin(); });

function renderAdmin() {
  const p = document.getElementById('admin-panel');
  p.innerHTML = `
    <h2>🔧 Admin — Bar KatKat</h2>

    <h3>🍹 Mixes (stock)</h3>
    ${MIXES.map(m => `
      <div class="admin-row">
        <div class="admin-label">${m.emoji} ${m.name} <small>${m.alc?'(alc)':'(sans alc)'}</small>
          <span class="admin-delete" onclick="deleteMix('${m.id}')" title="Supprimer">🗑</span>
        </div>
        <div class="admin-stock-ctrl">
          <button class="minus" onclick="adminMixStock('${m.id}',-1)">−</button>
          <input type="number" id="admin-mix-${m.id}" value="${state.mixes[m.id]||0}" onchange="setMixStock('${m.id}',this.value)" min="0">
          <button class="plus" onclick="adminMixStock('${m.id}',1)">+</button>
        </div>
      </div>
      <div style="padding:0 14px 8px;">
        ${m.combos.map((c,i) => `<div class="admin-combo-row">
          <span>${c.name} <small style="color:var(--sub)">${c.add}</small></span>
          <span class="admin-delete" onclick="deleteCombo('${m.id}',${i})" title="Supprimer">✕</span>
        </div>`).join('')}
        <div class="admin-combo-add" id="add-combo-${m.id}">
          <input placeholder="Nom du combo" id="combo-name-${m.id}">
          <input placeholder="Ajout (ex: + jus orange)" id="combo-add-${m.id}">
          <div style="display:flex;gap:6px;margin-top:4px;align-items:center;">
            <select id="combo-soft-${m.id}">
              ${SOFTS.map(s => `<option value="${s.id}">${s.emoji} ${s.name}</option>`).join('')}
            </select>
            <button class="admin-btn admin-btn-ok" onclick="addCombo('${m.id}')" style="padding:6px 12px;font-size:.85em;">+ Combo</button>
          </div>
        </div>
      </div>
    `).join('')}

    <h3 style="margin-top:20px;">➕ Ajouter un mix</h3>
    <div class="admin-add-form">
      <div class="row2">
        <div><label>Nom</label><input id="new-mix-name" placeholder="Mix Coco"></div>
        <div><label>Emoji</label><input id="new-mix-emoji" placeholder="🥥"></div>
      </div>
      <div class="row2">
        <div><label>Stock initial</label><input id="new-mix-stock" type="number" value="10" min="0"></div>
        <div><label>Alcool ?</label><select id="new-mix-alc"><option value="true">🔴 Oui</option><option value="false">🟢 Non</option></select></div>
      </div>
      <div style="text-align:center;margin-top:10px;"><button class="admin-btn admin-btn-ok" onclick="addMix()">Ajouter le mix</button></div>
    </div>

    <h3>🧊 Diluants (stock)</h3>
    ${SOFTS.map(d => `
      <div class="admin-row">
        <div class="admin-label">${d.emoji} ${d.name}
          <span class="admin-delete" onclick="deleteSoft('${d.id}')" title="Supprimer">🗑</span>
        </div>
        <div class="admin-stock-ctrl">
          <button class="minus" onclick="adminSoftStock('${d.id}',-1)">−</button>
          <input type="number" id="admin-soft-${d.id}" value="${state.softs[d.id]||0}" onchange="setSoftStock('${d.id}',this.value)" min="0">
          <button class="plus" onclick="adminSoftStock('${d.id}',1)">+</button>
        </div>
      </div>
    `).join('')}

    <h3 style="margin-top:20px;">➕ Ajouter un diluant</h3>
    <div class="admin-add-form">
      <div class="row2">
        <div><label>Nom</label><input id="new-soft-name" placeholder="Jus de cranberry"></div>
        <div><label>Emoji</label><input id="new-soft-emoji" placeholder="🫐"></div>
      </div>
      <div><label>Stock initial</label><input id="new-soft-stock" type="number" value="20" min="0"></div>
      <div style="text-align:center;margin-top:10px;"><button class="admin-btn admin-btn-ok" onclick="addSoft()">Ajouter le diluant</button></div>
    </div>

    <div class="admin-actions">
      <button class="admin-btn admin-btn-danger" onclick="resetAll()">🔄 Reset tout</button>
      <button class="admin-btn admin-btn-close" onclick="closeAdmin()">Fermer</button>
    </div>
  `;
}

// Admin: stock
window.adminMixStock = (id,d) => { state.mixes[id] = Math.max(0,(state.mixes[id]||0)+d); saveAll(); renderAdmin(); };
window.setMixStock = (id,v) => { state.mixes[id] = Math.max(0,parseInt(v)||0); saveAll(); };
window.adminSoftStock = (id,d) => { state.softs[id] = Math.max(0,(state.softs[id]||0)+d); saveAll(); renderAdmin(); };
window.setSoftStock = (id,v) => { state.softs[id] = Math.max(0,parseInt(v)||0); saveAll(); };

// Admin: add/delete mix
window.addMix = () => {
  const name = document.getElementById('new-mix-name').value.trim();
  const emoji = document.getElementById('new-mix-emoji').value.trim() || '🍹';
  const stock = parseInt(document.getElementById('new-mix-stock').value) || 10;
  const alc = document.getElementById('new-mix-alc').value === 'true';
  if (!name) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]/g,'') + '_' + Date.now();
  MIXES.push({ id, emoji, name, alc, stock, combos:[] });
  state.mixes[id] = stock;
  saveAll(); renderAdmin(); showToast('✅ Mix ajouté !');
};
window.deleteMix = (id) => {
  if (!confirm('Supprimer ce mix ?')) return;
  MIXES.splice(MIXES.findIndex(m=>m.id===id), 1);
  delete state.mixes[id];
  saveAll(); renderAdmin(); showToast('🗑 Mix supprimé');
};

// Admin: add/delete soft
window.addSoft = () => {
  const name = document.getElementById('new-soft-name').value.trim();
  const emoji = document.getElementById('new-soft-emoji').value.trim() || '🧊';
  const stock = parseInt(document.getElementById('new-soft-stock').value) || 20;
  if (!name) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]/g,'') + '_' + Date.now();
  SOFTS.push({ id, emoji, name, stock });
  state.softs[id] = stock;
  saveAll(); renderAdmin(); showToast('✅ Diluant ajouté !');
};
window.deleteSoft = (id) => {
  if (!confirm('Supprimer ce diluant ?')) return;
  SOFTS.splice(SOFTS.findIndex(d=>d.id===id), 1);
  delete state.softs[id];
  saveAll(); renderAdmin(); showToast('🗑 Diluant supprimé');
};

// Admin: combos
window.addCombo = (mixId) => {
  const name = document.getElementById('combo-name-'+mixId).value.trim();
  const add = document.getElementById('combo-add-'+mixId).value.trim();
  const soft = document.getElementById('combo-soft-'+mixId).value;
  if (!name || !add) return;
  const m = MIXES.find(x=>x.id===mixId);
  m.combos.push({ name, add, soft });
  saveAll(); renderAdmin(); showToast('✅ Combo ajouté !');
};
window.deleteCombo = (mixId, idx) => {
  MIXES.find(x=>x.id===mixId).combos.splice(idx, 1);
  saveAll(); renderAdmin();
};

// Reset all
window.resetAll = () => {
  if (!confirm('Tout remettre par défaut ? (mixes, diluants, stock)')) return;
  localStorage.removeItem('barkatkat_v2');
  loadAll(); saveAll(); renderAdmin(); renderMixes(); renderSofts(); showToast('🔄 Tout réinitialisé');
};
</script>
</body>
</html>
