<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bar KatKat 🍹</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#1a1a2e; --card:#16213e; --accent:#e94560;
  --text:#eee; --sub:#aaa; --ok:#4ecca3; --warn:#f0a500; --danger:#e94560;
}
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

/* ===== COUNTDOWN ===== */
#countdown-screen {
  position:fixed; inset:0; z-index:100; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:24px;
}
#countdown-screen .logo { font-size:4em; margin-bottom:12px; animation:float 3s ease-in-out infinite; cursor:default; user-select:none; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
#countdown-screen h1 { font-size:2em; margin-bottom:4px; }
#countdown-screen .tagline { color:var(--sub); font-size:1em; margin-bottom:32px; font-style:italic; }
#countdown-timer { display:flex; gap:16px; margin-bottom:32px; }
#countdown-timer .unit { background:var(--card); border-radius:16px; padding:16px 20px; min-width:72px; }
#countdown-timer .unit .num { font-size:2.4em; font-weight:700; color:var(--accent); }
#countdown-timer .unit .label { font-size:.75em; color:var(--sub); text-transform:uppercase; letter-spacing:1px; }
#countdown-screen .tease { color:var(--sub); font-size:.85em; margin-top:8px; }
#countdown-screen .tease span { color:var(--accent); }
.particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.particle { position:absolute; font-size:1.4em; opacity:.15; animation:drift linear infinite; }
@keyframes drift { 0%{transform:translateY(100vh) rotate(0deg)} 100%{transform:translateY(-20vh) rotate(360deg)} }

/* ===== BAR MAIN ===== */
#bar-content { display:none; }
#bar-content.active { display:block; }

.bar-header { text-align:center; padding:20px 16px 8px; user-select:none; cursor:default; }
.bar-header h1 { font-size:1.8em; }
.bar-header small { display:block; font-size:.75em; color:var(--sub); font-weight:normal; margin-top:4px; }

/* Tab bar */
.tab-bar { display:flex; overflow-x:auto; gap:8px; padding:8px 16px 12px; -webkit-overflow-scrolling:touch; scrollbar-width:thin; scrollbar-color:var(--accent) var(--card); }
.tab-bar::-webkit-scrollbar { height:4px; }
.tab-bar::-webkit-scrollbar-track { background:var(--card); border-radius:4px; }
.tab-bar::-webkit-scrollbar-thumb { background:var(--accent); border-radius:4px; }
.tab { flex-shrink:0; background:var(--card); border:2px solid transparent; border-radius:14px; padding:10px 18px;
  text-align:center; cursor:pointer; transition:all .15s; min-width:90px; }
.tab.active { border-color:var(--accent); background:#2a1a3e; }
.tab .tab-emoji { font-size:1.6em; }
.tab .tab-name { font-size:.75em; margin-top:2px; color:var(--sub); }
.tab.active .tab-name { color:var(--text); }
.tab .tab-badge { display:inline-block; font-size:.6em; padding:1px 6px; border-radius:8px; margin-top:4px; font-weight:600; }
.tab .badge-alc { background:#3a0a1e; color:var(--danger); }
.tab .badge-na { background:#0f3460; color:var(--ok); }

/* Cocktail list */
.cocktail-section { padding:12px 16px 100px; }
.section-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.section-header .sec-emoji { font-size:2.4em; }
.section-header .sec-info h2 { font-size:1.3em; }
.section-header .sec-info .sec-stock { font-size:.85em; color:var(--sub); }
.section-header .sec-info .sec-stock strong { font-weight:700; }

.cocktail-card {
  background:var(--card); border-radius:16px; padding:16px; margin-bottom:12px;
  display:flex; align-items:center; gap:14px; cursor:pointer;
  transition:transform .12s, opacity .12s; position:relative;
}
.cocktail-card:active { transform:scale(.97); }
.cocktail-card.disabled { opacity:.35; pointer-events:none; }
.cocktail-card .cc-icon { font-size:2em; flex-shrink:0; width:48px; text-align:center; }
.cocktail-card .cc-body { flex:1; }
.cocktail-card .cc-name { font-size:1.05em; font-weight:600; }
.cocktail-card .cc-recipe { font-size:.82em; color:var(--sub); margin-top:3px; line-height:1.4; }
.cocktail-card .cc-recipe em { color:var(--ok); font-style:normal; }
.cocktail-card .cc-go { font-size:1.4em; flex-shrink:0; opacity:.4; }
.cocktail-card:not(.disabled) .cc-go { opacity:1; }

/* Serve animation */
@keyframes served { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
.cocktail-card.just-served { animation:served .4s ease; }

/* Toast */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--ok); color:#000;
  padding:10px 24px; border-radius:12px; font-weight:600; font-size:.95em; z-index:20; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }

/* Out of stock banner */
.oos-banner { text-align:center; color:var(--danger); font-size:.85em; padding:8px; margin:8px 16px; background:rgba(233,69,96,.1); border-radius:10px; }

/* ===== CONFIRM ===== */
.confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:30; justify-content:center; align-items:center; padding:16px; }
.confirm-overlay.active { display:flex; }
.confirm-box { background:var(--card); border-radius:20px; max-width:340px; width:100%; padding:24px; text-align:center; }
.confirm-emoji { font-size:3em; margin-bottom:8px; }
.confirm-title { font-size:1.1em; color:var(--sub); margin-bottom:12px; }
.confirm-name { font-size:1.3em; font-weight:700; margin-bottom:6px; }
.confirm-recipe { font-size:.85em; color:var(--ok); margin-bottom:20px; }
.confirm-btns { display:flex; gap:12px; justify-content:center; }
.confirm-btn { padding:12px 28px; border-radius:12px; border:none; font-size:1em; font-weight:600; cursor:pointer; }
.confirm-btn.cancel { background:#333; color:var(--text); }
.confirm-btn.ok { background:var(--ok); color:#000; }

/* ===== ADMIN ===== */
#admin-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:50; overflow-y:auto; padding:16px; }
#admin-overlay.active { display:flex; justify-content:center; align-items:flex-start; }
#admin-panel { background:var(--card); border-radius:20px; max-width:500px; width:100%; padding:20px; margin:20px auto; }
#admin-panel h2 { text-align:center; margin-bottom:16px; color:var(--accent); }
#admin-panel h3 { margin:16px 0 8px; color:var(--ok); font-size:1em; }
.admin-row { display:flex; align-items:center; justify-content:space-between; background:var(--bg); border-radius:10px; padding:10px 14px; margin:6px 0; flex-wrap:wrap; }
.admin-row .admin-label { font-size:.95em; flex:1; min-width:120px; }
.admin-row .admin-label small { color:var(--sub); }
.admin-stock-ctrl { display:flex; align-items:center; gap:8px; }
.admin-stock-ctrl button { width:30px; height:30px; border-radius:50%; border:none; font-size:1em; cursor:pointer; font-weight:700; }
.admin-stock-ctrl .minus { background:#3a0a1e; color:var(--danger); }
.admin-stock-ctrl .plus { background:#0a2e1e; color:var(--ok); }
.admin-stock-ctrl input[type=number] { width:50px; text-align:center; background:var(--card); border:1px solid #333; color:var(--text); border-radius:8px; padding:4px; font-size:1em; }
.admin-add-form { background:var(--bg); border-radius:12px; padding:14px; margin:8px 0; }
.admin-add-form label { display:block; font-size:.8em; color:var(--sub); margin:8px 0 2px; }
.admin-add-form input, .admin-add-form select { width:100%; padding:8px; border-radius:8px; border:1px solid #333; background:var(--card); color:var(--text); font-size:.95em; }
.admin-add-form .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.admin-btn { display:inline-block; margin:6px 4px; padding:8px 20px; border-radius:10px; border:none; font-size:.95em; cursor:pointer; font-weight:600; }
.admin-btn-ok { background:var(--ok); color:#000; }
.admin-btn-danger { background:var(--danger); color:#fff; }
.admin-btn-close { background:#333; color:var(--text); }
.admin-delete { cursor:pointer; color:var(--danger); font-size:.8em; margin-left:8px; opacity:.6; }
.admin-delete:hover { opacity:1; }
.admin-combo-row { display:flex; align-items:center; gap:6px; background:var(--bg); border-radius:8px; padding:6px 10px; margin:4px 0; font-size:.85em; }
.admin-combo-row span { flex:1; }
.admin-combo-add { background:var(--bg); border-radius:8px; padding:8px; margin:4px 0; }
.admin-combo-add input { width:100%; padding:6px; border-radius:6px; border:1px solid #333; background:var(--card); color:var(--text); font-size:.85em; margin:2px 0; }
.admin-combo-add select { width:100%; padding:6px; border-radius:6px; border:1px solid #333; background:var(--card); color:var(--text); font-size:.85em; }
.admin-actions { text-align:center; margin-top:16px; }

/* ===== RESPONSIVE ===== */

/* Smartphone (≤480px) */
@media (max-width:480px) {
  .bar-header h1 { font-size:1.4em; }
  .tab { padding:8px 12px; min-width:75px; }
  .tab .tab-emoji { font-size:1.3em; }
  .tab .tab-name { font-size:.65em; }
  .tab .tab-badge { font-size:.5em; }
  .section-header .sec-emoji { font-size:1.8em; }
  .section-header .sec-info h2 { font-size:1.1em; }
  .cocktail-card { padding:12px; gap:10px; }
  .cocktail-card .cc-icon { font-size:1.6em; width:36px; }
  .cocktail-card .cc-name { font-size:.95em; }
  .cocktail-card .cc-recipe { font-size:.75em; }
  #countdown-timer { gap:8px; }
  #countdown-timer .unit { padding:10px 12px; min-width:55px; }
  #countdown-timer .unit .num { font-size:1.8em; }
  #countdown-screen h1 { font-size:1.5em; }
  #admin-panel { padding:14px; }
  .admin-row { padding:8px 10px; }
  .admin-add-form .row2 { grid-template-columns:1fr; }
}

/* Tablette (481px–1024px) */
@media (min-width:481px) and (max-width:1024px) {
  body { padding:16px; }
  .bar-header { padding:24px 20px 12px; }
  .bar-header h1 { font-size:2em; }
  .tab-bar { padding:10px 20px; gap:10px; justify-content:center; flex-wrap:wrap; }
  .tab { padding:12px 22px; min-width:100px; }
  .tab .tab-emoji { font-size:1.8em; }
  .cocktail-section { padding:16px 20px 100px; max-width:700px; margin:0 auto; }
  .section-header { margin-bottom:20px; }
  .cocktail-card { padding:18px; gap:16px; }
  .cocktail-card .cc-icon { font-size:2.2em; width:52px; }
  .cocktail-card .cc-name { font-size:1.1em; }
  .cocktail-card .cc-recipe { font-size:.88em; }
  #admin-panel { max-width:600px; }
}

/* Grand écran / tablette paysage (>1024px) */
@media (min-width:1025px) {
  .bar-header h1 { font-size:2.2em; }
  .tab-bar { justify-content:center; gap:12px; padding:12px 24px; }
  .tab { padding:14px 28px; min-width:110px; border-radius:16px; }
  .cocktail-section { max-width:800px; margin:0 auto; padding:20px 24px 100px; }
  .cocktail-card { padding:20px; border-radius:18px; }
  .cocktail-card .cc-icon { font-size:2.4em; width:56px; }
  .cocktail-card .cc-name { font-size:1.15em; }
  .cocktail-card .cc-recipe { font-size:.9em; }
  #admin-panel { max-width:650px; }
}
</style>
</head>
<body>

<!-- COUNTDOWN -->
<div id="countdown-screen">
  <div class="particles" id="particles"></div>
  <div class="logo" id="countdown-logo">🍹</div>
  <h1>Bar KatKat</h1>
  <div class="tagline">Something's brewing...</div>
  <div id="countdown-timer">
    <div class="unit"><div class="num" id="cd-days">--</div><div class="label">Jours</div></div>
    <div class="unit"><div class="num" id="cd-hours">--</div><div class="label">Heures</div></div>
    <div class="unit"><div class="num" id="cd-mins">--</div><div class="label">Min</div></div>
    <div class="unit"><div class="num" id="cd-secs">--</div><div class="label">Sec</div></div>
  </div>
  <div class="tease">🔒 Ouverture le <span>5 avril à 11h30</span></div>
</div>

<!-- BAR -->
<div id="bar-content">
  <div class="bar-header" id="title">
    <h1>Bar KatKat 🍹</h1>
    <small>Tape un mix, choisis ton cocktail !</small>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="cocktail-section" id="cocktailSection"></div>
  <div class="toast" id="toast"></div>

  <!-- CONFIRM -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-emoji">🍹</div>
      <div class="confirm-title">Servir ce cocktail ?</div>
      <div class="confirm-name" id="confirm-name"></div>
      <div class="confirm-recipe" id="confirm-recipe"></div>
      <div class="confirm-btns">
        <button class="confirm-btn cancel" onclick="cancelServe()">Annuler</button>
        <button class="confirm-btn ok" onclick="confirmServe()">Servir !</button>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-overlay">
  <div id="admin-panel"></div>
</div>

<script>
// ===== DATA =====
const DEFAULT_MIXES = [
  { id:'tropical', emoji:'🥭', name:'Mix Tropical', alc:false, stock:8,
    combos:[
      { name:'Tropical Fizz', recipe:'Mix Tropical + 120ml tonic + glaçons', soft:'tonic', icon:'🫧' },
      { name:'Tropical Ananas', recipe:'Mix Tropical + 100ml jus d\'ananas + glaçons', soft:'ananas', icon:'🍍' },
      { name:'Tropical Mangue', recipe:'Mix Tropical + 100ml jus de mangue + glaçons', soft:'mangue', icon:'🥭' },
    ]},
  { id:'fresh', emoji:'🌿', name:'Mix Fresh', alc:false, stock:6,
    combos:[
      { name:'Virgin Mojito', recipe:'Mix Fresh + 120ml eau gazeuse + menthe fraîche + quartier de lime', soft:'gazeuse', icon:'🍃' },
      { name:'Fresh Tonic', recipe:'Mix Fresh + 120ml tonic + glaçons', soft:'tonic', icon:'🫧' },
    ]},
  { id:'maitai', emoji:'🏝', name:'Mix Mai Tai', alc:true, stock:10,
    combos:[
      { name:'Mai Tai Classique', recipe:'Mix Mai Tai + 80ml jus d\'ananas + glaçons pilés', soft:'ananas', icon:'🍍' },
      { name:'Mai Tai Tropical', recipe:'Mix Mai Tai + 80ml jus de mangue + glaçons', soft:'mangue', icon:'🥭' },
      { name:'Mai Tai Ginger', recipe:'Mix Mai Tai + 100ml ginger beer + glaçons', soft:'ginger', icon:'🫚' },
    ]},
  { id:'passion', emoji:'🍑', name:'Mix Passion', alc:true, stock:10,
    combos:[
      { name:'Pornstar Martini', recipe:'Mix Passion + shot de prosecco à côté', soft:'prosecco', icon:'🥂' },
      { name:'Passion Orange', recipe:'Mix Passion + 80ml jus d\'orange + glaçons', soft:'orange', icon:'🍊' },
      { name:'Passion Mangue', recipe:'Mix Passion + 80ml jus de mangue + glaçons', soft:'mangue', icon:'🥭' },
      { name:'Passion Tonic', recipe:'Mix Passion + 120ml tonic + glaçons', soft:'tonic', icon:'🫧' },
      { name:'Passion Ananas', recipe:'Mix Passion + 80ml jus d\'ananas + glaçons', soft:'ananas', icon:'🍍' },
    ]},
  { id:'ginger', emoji:'🫚', name:'Mix Ginger', alc:true, stock:8,
    combos:[
      { name:'Moscow Mule', recipe:'Mix Ginger + 120ml ginger beer + quartier de lime + glaçons', soft:'ginger', icon:'🫚' },
      { name:'Ginger Sunrise', recipe:'Mix Ginger + 80ml jus d\'orange + glaçons', soft:'orange', icon:'🌅' },
      { name:'Ginger Ananas', recipe:'Mix Ginger + 80ml jus d\'ananas + glaçons', soft:'ananas', icon:'🍍' },
    ]},
  { id:'sunset', emoji:'🍊', name:'Mix Sunset', alc:true, stock:12,
    combos:[
      { name:'Sunset Classique', recipe:'Mix Sunset + 100ml jus d\'orange + glaçons 🌅', soft:'orange', icon:'🌅' },
      { name:'Sunset Ananas', recipe:'Mix Sunset + 100ml jus d\'ananas + glaçons', soft:'ananas', icon:'🍍' },
      { name:'Sunset Tonic', recipe:'Mix Sunset + 120ml tonic + glaçons', soft:'tonic', icon:'🫧' },
    ]},
  { id:'espresso', emoji:'☕', name:'Mix Espresso', alc:true, stock:10,
    combos:[
      { name:'Espresso Martini', recipe:'Mix Espresso + 30ml café froid + glaçons + shaker', soft:'cafe', icon:'☕' },
      { name:'Espresso Orange', recipe:'Mix Espresso + 80ml jus d\'orange + glaçons', soft:'orange', icon:'🍊' },
      { name:'Espresso Ginger', recipe:'Mix Espresso + 100ml ginger beer + glaçons', soft:'ginger', icon:'🫚' },
    ]},
];

const DEFAULT_SOFTS = [
  { id:'ginger', emoji:'🫚', name:'Ginger beer', stock:30 },
  { id:'orange', emoji:'🍊', name:'Jus orange', stock:30 },
  { id:'gazeuse', emoji:'💧', name:'Eau gazeuse', stock:20 },
  { id:'tonic', emoji:'🧊', name:'Tonic', stock:30 },
  { id:'ananas', emoji:'🍍', name:'Jus ananas', stock:30 },
  { id:'cafe', emoji:'☕', name:'Café froid', stock:10 },
  { id:'prosecco', emoji:'🥂', name:'Prosecco', stock:8 },
  { id:'mangue', emoji:'🥭', name:'Jus mangue', stock:20 },
];

// ===== STATE =====
let MIXES, SOFTS, state, activeTab;

function loadAll() {
  try {
    const saved = JSON.parse(localStorage.getItem('barkatkat_v3'));
    if (saved && saved.mixes && saved.softs && saved.stock) {
      MIXES = saved.mixes; SOFTS = saved.softs; state = saved.stock;
      return;
    }
  } catch(e) {}
  MIXES = JSON.parse(JSON.stringify(DEFAULT_MIXES));
  SOFTS = JSON.parse(JSON.stringify(DEFAULT_SOFTS));
  state = { mixes:{}, softs:{} };
  MIXES.forEach(m => state.mixes[m.id] = m.stock);
  SOFTS.forEach(d => state.softs[d.id] = d.stock);
}
function saveAll() { localStorage.setItem('barkatkat_v3', JSON.stringify({ mixes:MIXES, softs:SOFTS, stock:state })); }
loadAll();
activeTab = MIXES[0]?.id || '';

// ===== COUNTDOWN =====
const LAUNCH = new Date('2026-04-05T11:30:00+02:00');
function spawnParticles() {
  const emojis = ['🍹','🍸','🧊','🍋','🫚','🥭','🍊','☕','🥂','🌿','🍍'];
  const c = document.getElementById('particles');
  for (let i=0;i<15;i++) { const p=document.createElement('div'); p.className='particle'; p.textContent=emojis[Math.floor(Math.random()*emojis.length)]; p.style.left=Math.random()*100+'%'; p.style.animationDuration=(8+Math.random()*12)+'s'; p.style.animationDelay=(-Math.random()*15)+'s'; p.style.fontSize=(1+Math.random()*1.2)+'em'; c.appendChild(p); }
}
function launchBar() { document.getElementById('countdown-screen').style.display='none'; document.getElementById('bar-content').classList.add('active'); }
function updateCountdown() {
  const diff=LAUNCH-new Date();
  if(diff<=0){launchBar();return;}
  document.getElementById('cd-days').textContent=String(Math.floor(diff/864e5)).padStart(2,'0');
  document.getElementById('cd-hours').textContent=String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
  document.getElementById('cd-mins').textContent=String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
  document.getElementById('cd-secs').textContent=String(Math.floor((diff%6e4)/1e3)).padStart(2,'0');
  setTimeout(updateCountdown,1000);
}
// Triple-tap bypass
let tapC=0,tapT; document.getElementById('countdown-logo').addEventListener('click',()=>{ tapC++; clearTimeout(tapT); if(tapC>=3){tapC=0;launchBar();return;} tapT=setTimeout(()=>tapC=0,600); });
spawnParticles(); updateCountdown();

// ===== BAR RENDERING =====
function stockClass(n){return n<=0?'stock-danger':n<=3?'stock-warn':'stock-ok';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}

function renderTabs() {
  document.getElementById('tabBar').innerHTML = MIXES.map(m => {
    const s = state.mixes[m.id]||0;
    return `<div class="tab ${m.id===activeTab?'active':''}" onclick="switchTab('${m.id}')">
      <div class="tab-emoji">${m.emoji}</div>
      <div class="tab-name">${m.name.replace('Mix ','')}</div>
      <div class="tab-badge ${m.alc?'badge-alc':'badge-na'}">${m.alc?'Alcool':'Sans alc.'}</div>
    </div>`;
  }).join('');
}

function renderCocktails() {
  const m = MIXES.find(x=>x.id===activeTab);
  if (!m) return;
  const ms = state.mixes[m.id]||0;
  const sec = document.getElementById('cocktailSection');

  let html = `<div class="section-header">
    <div class="sec-emoji">${m.emoji}</div>
    <div class="sec-info">
      <h2>${m.name}</h2>
      <div class="sec-stock">Stock : <strong class="${stockClass(ms)}">${ms} fiole${ms>1?'s':''}</strong></div>
    </div>
  </div>`;

  if (ms <= 0) {
    html += `<div class="oos-banner">⚠️ Plus de stock pour ce mix !</div>`;
  }

  html += m.combos.map((c,i) => {
    const softStock = state.softs[c.soft]||0;
    const canMake = ms>0 && softStock>0;
    const softInfo = SOFTS.find(s=>s.id===c.soft);
    const warnSoft = softStock<=0 ? ` — <span style="color:var(--danger)">${softInfo?softInfo.name:'diluant'} épuisé</span>` : '';
    return `<div class="cocktail-card ${canMake?'':'disabled'}" id="cc-${m.id}-${i}" onclick="serveCocktail('${m.id}','${c.soft}',${i})">
      <div class="cc-icon">${c.icon||'🍹'}</div>
      <div class="cc-body">
        <div class="cc-name">${c.name}</div>
        <div class="cc-recipe"><em>${c.recipe||c.add}</em>${warnSoft}</div>
      </div>
      <div class="cc-go">${canMake?'→':'✕'}</div>
    </div>`;
  }).join('');

  sec.innerHTML = html;
}

window.switchTab = (id) => { activeTab=id; renderTabs(); renderCocktails(); };

// Confirm overlay
window.serveCocktail = (mixId, softId, idx) => {
  if ((state.mixes[mixId]||0)<=0 || (state.softs[softId]||0)<=0) return;
  const m = MIXES.find(x=>x.id===mixId);
  const c = m.combos[idx];
  pendingServe = {mixId, softId, idx};
  document.getElementById('confirm-name').textContent = c.name;
  document.getElementById('confirm-recipe').textContent = c.recipe || '';
  document.getElementById('confirm-overlay').classList.add('active');
};
window.confirmServe = () => {
  if (!pendingServe) return;
  const {mixId, softId, idx} = pendingServe;
  state.mixes[mixId]--; state.softs[softId]--;
  saveAll(); renderTabs(); renderCocktails();
  document.getElementById('confirm-overlay').classList.remove('active');
  const el = document.getElementById(`cc-${mixId}-${idx}`);
  if (el) { el.classList.add('just-served'); setTimeout(()=>el.classList.remove('just-served'),500); }
  showToast('🍹 Cocktail servi !');
  pendingServe = null;
};
window.cancelServe = () => {
  pendingServe = null;
  document.getElementById('confirm-overlay').classList.remove('active');
};
let pendingServe = null;
document.getElementById('confirm-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) cancelServe(); });

renderTabs(); renderCocktails();

// ===== ADMIN =====
let adminTimer;
const title = document.getElementById('title');
function startAdmin(){adminTimer=setTimeout(openAdmin,3000);}
function cancelAdmin(){clearTimeout(adminTimer);}
title.addEventListener('touchstart',startAdmin); title.addEventListener('touchend',cancelAdmin);
title.addEventListener('mousedown',startAdmin); title.addEventListener('mouseup',cancelAdmin);

function openAdmin(){renderAdmin();document.getElementById('admin-overlay').classList.add('active');}
window.closeAdmin=()=>{document.getElementById('admin-overlay').classList.remove('active');renderTabs();renderCocktails();};
document.getElementById('admin-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAdmin();});

function renderAdmin(){
  const p=document.getElementById('admin-panel');
  p.innerHTML=`
    <h2>🔧 Admin — Bar KatKat</h2>

    <h3>🍹 Mixes</h3>
    ${MIXES.map(m=>`
      <div class="admin-row">
        <div class="admin-label">${m.emoji} ${m.name} <small>${m.alc?'(alc)':'(sans alc)'}</small>
          <span class="admin-delete" onclick="deleteMix('${m.id}')">🗑</span>
        </div>
        <div class="admin-stock-ctrl">
          <button class="minus" onclick="adminMixStock('${m.id}',-1)">−</button>
          <input type="number" value="${state.mixes[m.id]||0}" onchange="setMixStock('${m.id}',this.value)" min="0">
          <button class="plus" onclick="adminMixStock('${m.id}',1)">+</button>
        </div>
      </div>
      <div style="padding:0 14px 8px;">
        ${m.combos.map((c,i)=>`<div class="admin-combo-row">
          <span>${c.name} <small style="color:var(--sub)">${c.recipe||c.add||''}</small></span>
          <span class="admin-delete" onclick="deleteCombo('${m.id}',${i})">✕</span>
        </div>`).join('')}
        <div class="admin-combo-add">
          <input placeholder="Nom du cocktail" id="cn-${m.id}">
          <input placeholder="Recette (ex: Mix X + 100ml jus orange + glaçons)" id="cr-${m.id}">
          <input placeholder="Icône emoji (ex: 🍊)" id="ci-${m.id}" style="width:60px;display:inline-block;">
          <select id="cs-${m.id}" style="margin-top:4px;">${SOFTS.map(s=>`<option value="${s.id}">${s.emoji} ${s.name}</option>`).join('')}</select>
          <div style="text-align:right;margin-top:6px;"><button class="admin-btn admin-btn-ok" onclick="addCombo('${m.id}')" style="padding:6px 14px;font-size:.85em;">+ Cocktail</button></div>
        </div>
      </div>
    `).join('')}

    <h3 style="margin-top:20px;">➕ Ajouter un mix</h3>
    <div class="admin-add-form">
      <div class="row2"><div><label>Nom</label><input id="nm-name" placeholder="Mix Coco"></div><div><label>Emoji</label><input id="nm-emoji" placeholder="🥥"></div></div>
      <div class="row2"><div><label>Stock</label><input id="nm-stock" type="number" value="10" min="0"></div><div><label>Alcool ?</label><select id="nm-alc"><option value="true">🔴 Oui</option><option value="false">🟢 Non</option></select></div></div>
      <div style="text-align:center;margin-top:10px;"><button class="admin-btn admin-btn-ok" onclick="addMix()">Ajouter</button></div>
    </div>

    <h3>🧊 Diluants</h3>
    ${SOFTS.map(d=>`
      <div class="admin-row">
        <div class="admin-label">${d.emoji} ${d.name} <span class="admin-delete" onclick="deleteSoft('${d.id}')">🗑</span></div>
        <div class="admin-stock-ctrl">
          <button class="minus" onclick="adminSoftStock('${d.id}',-1)">−</button>
          <input type="number" value="${state.softs[d.id]||0}" onchange="setSoftStock('${d.id}',this.value)" min="0">
          <button class="plus" onclick="adminSoftStock('${d.id}',1)">+</button>
        </div>
      </div>
    `).join('')}

    <h3 style="margin-top:20px;">➕ Ajouter un diluant</h3>
    <div class="admin-add-form">
      <div class="row2"><div><label>Nom</label><input id="ns-name" placeholder="Jus cranberry"></div><div><label>Emoji</label><input id="ns-emoji" placeholder="🫐"></div></div>
      <div><label>Stock</label><input id="ns-stock" type="number" value="20" min="0"></div>
      <div style="text-align:center;margin-top:10px;"><button class="admin-btn admin-btn-ok" onclick="addSoft()">Ajouter</button></div>
    </div>

    <div class="admin-actions">
      <button class="admin-btn admin-btn-danger" onclick="resetAll()">🔄 Reset tout</button>
      <button class="admin-btn admin-btn-close" onclick="closeAdmin()">Fermer</button>
    </div>`;
}

window.adminMixStock=(id,d)=>{state.mixes[id]=Math.max(0,(state.mixes[id]||0)+d);saveAll();renderAdmin();};
window.setMixStock=(id,v)=>{state.mixes[id]=Math.max(0,parseInt(v)||0);saveAll();};
window.adminSoftStock=(id,d)=>{state.softs[id]=Math.max(0,(state.softs[id]||0)+d);saveAll();renderAdmin();};
window.setSoftStock=(id,v)=>{state.softs[id]=Math.max(0,parseInt(v)||0);saveAll();};

window.addMix=()=>{
  const name=document.getElementById('nm-name').value.trim(),emoji=document.getElementById('nm-emoji').value.trim()||'🍹',
    stock=parseInt(document.getElementById('nm-stock').value)||10,alc=document.getElementById('nm-alc').value==='true';
  if(!name)return; const id=name.toLowerCase().replace(/[^a-z0-9]/g,'')+'_'+Date.now();
  MIXES.push({id,emoji,name,alc,stock,combos:[]});state.mixes[id]=stock;saveAll();renderAdmin();showToast('✅ Mix ajouté !');
};
window.deleteMix=(id)=>{if(!confirm('Supprimer ce mix ?'))return;MIXES.splice(MIXES.findIndex(m=>m.id===id),1);delete state.mixes[id];saveAll();renderAdmin();showToast('🗑 Supprimé');};

window.addSoft=()=>{
  const name=document.getElementById('ns-name').value.trim(),emoji=document.getElementById('ns-emoji').value.trim()||'🧊',
    stock=parseInt(document.getElementById('ns-stock').value)||20;
  if(!name)return; const id=name.toLowerCase().replace(/[^a-z0-9]/g,'')+'_'+Date.now();
  SOFTS.push({id,emoji,name,stock});state.softs[id]=stock;saveAll();renderAdmin();showToast('✅ Diluant ajouté !');
};
window.deleteSoft=(id)=>{if(!confirm('Supprimer ?'))return;SOFTS.splice(SOFTS.findIndex(d=>d.id===id),1);delete state.softs[id];saveAll();renderAdmin();showToast('🗑 Supprimé');};

window.addCombo=(mixId)=>{
  const name=document.getElementById('cn-'+mixId).value.trim(),recipe=document.getElementById('cr-'+mixId).value.trim(),
    icon=document.getElementById('ci-'+mixId).value.trim()||'🍹',soft=document.getElementById('cs-'+mixId).value;
  if(!name||!recipe)return; MIXES.find(x=>x.id===mixId).combos.push({name,recipe,soft,icon});saveAll();renderAdmin();showToast('✅ Cocktail ajouté !');
};
window.deleteCombo=(mixId,idx)=>{MIXES.find(x=>x.id===mixId).combos.splice(idx,1);saveAll();renderAdmin();};

window.resetAll=()=>{if(!confirm('Tout remettre par défaut ?'))return;localStorage.removeItem('barkatkat_v3');loadAll();activeTab=MIXES[0]?.id||'';saveAll();renderAdmin();renderTabs();renderCocktails();showToast('🔄 Réinitialisé');};
</script>
</body>
</html>
